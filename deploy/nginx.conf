# Launch page — static SPA (gennetten.org)
# Install: copy to /etc/nginx/sites-available/ and symlink into sites-enabled.

server {
    listen 80;
    listen [::]:80;
    server_name gennetten.org www.gennetten.org;

    # Redirect HTTP to HTTPS (adjust cert paths for your setup)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gennetten.org www.gennetten.org;

    root /var/www/gennetten.org/html;
    index index.html;

    # ssl_certificate     /etc/letsencrypt/live/gennetten.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/gennetten.org/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Optional: extra server-side protection for the editor route.
    # Generate: htpasswd -c /etc/nginx/.htpasswd-admin <username>
    # location = /admin {
    #     auth_basic "Admin";
    #     auth_basic_user_file /etc/nginx/.htpasswd-admin;
    #     try_files $uri $uri/ /index.html;
    # }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /robots.txt {
        access_log off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
